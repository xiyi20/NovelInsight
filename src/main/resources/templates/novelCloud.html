<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport">
  <link rel="apple-touch-icon" sizes="76x76" th:href="@{/assets/img/apple-icon.png}">
  <link rel="icon" th:href="@{/assets/img/favicon.png}" type="image/png">
  <title>小说词云图 - 小说数据分析可视化系统</title>
  <!-- CSS Files -->
  <link rel="stylesheet" th:href="@{/assets/css/nucleo-icons.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/black-dashboard.css}" />
  <!-- CSS Just for demo purpose, don't include it in your project -->
  <link rel="stylesheet" th:href="@{/assets/demo/demo.css}" />
</head>

<body class="">
  <div class="wrapper">
    <!-- 侧边栏 -->
    <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}">
      <!-- 侧边栏内容将通过Thymeleaf片段加载 -->
    </div>

    <div class="main-panel">
      <!-- 导航栏 -->
      <nav class="navbar navbar-expand-lg navbar-absolute navbar-transparent">
        <div class="container-fluid">
          <div class="navbar-wrapper">
            <div class="navbar-toggle d-inline">
              <button class="navbar-toggler" type="button">
                <span class="navbar-toggler-bar bar1"></span>
                <span class="navbar-toggler-bar bar2"></span>
                <span class="navbar-toggler-bar bar3"></span>
              </button>
            </div>
            <a class="navbar-brand" href="javascript:void(0)">小说词云图</a>
          </div>
          <div class="collapse navbar-collapse" id="navigation">
            <ul class="navbar-nav ml-auto">
              <li class="nav-item">
                <span class="nav-link">欢迎，<span th:text="${userInfo.username}">用户</span></span>
              </li>
              <li class="nav-item">
                <a class="nav-link" th:href="@{/app/logout}">
                  <i class="tim-icons icon-button-power"></i> 退出
                </a>
              </li>
            </ul>
          </div>
        </div>
      </nav>

      <!-- 内容区域 -->
      <div class="content">
        <!-- 显示错误/成功消息 -->
        <div class="alert alert-danger" role="alert" th:if="${errorMessage}">
          <span th:text="${errorMessage}"></span>
        </div>
        <div class="alert alert-success" role="alert" th:if="${successMessage}">
          <span th:text="${successMessage}"></span>
        </div>
        <div class="row">
          <h3 style="margin-left: 15px">小说词云图分析</h3>
        </div>
        <div class="row">
          <div class="col-lg-12 col-md-12">
            <div class="card card-tasks" style="height: 700px">
              <div class="card-header">
                <div class="row align-items-center">
                  <div class="col-md-6">
                    <h4 class="title d-inline">小说词云图 - <span th:text="${dataTypeName}">书名</span></h4>
                  </div>
                  <div class="col-md-6 text-right">
                    <div class="dropdown d-inline-block">
                      <button aria-expanded="false" aria-haspopup="true" class="btn btn-sm btn-primary dropdown-toggle" data-toggle="dropdown" id="dataTypeDropdown" type="button">
                        数据源: <span th:text="${dataTypeName}">书名</span>
                      </button>
                      <div aria-labelledby="dataTypeDropdown" class="dropdown-menu dropdown-menu-right">
                        <a class="dropdown-item" th:href="@{/app/novelCloud(dataType='title')}">书名</a>
                        <a class="dropdown-item" th:href="@{/app/novelCloud(dataType='author')}">作者</a>
                        <a class="dropdown-item" th:href="@{/app/novelCloud(dataType='type')}">类型</a>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="card-body">
                <div id="wordcloud" style="width: 100%; height: 600px"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <footer class="footer">
        <div class="container-fluid">
          <ul class="nav">
          </ul>
          <div class="copyright">Copyright &copy; 2026.小说数据分析与可视化系统.</div>
        </div>
      </footer>
    </div>
  </div>

  <!-- Core JS Files -->
  <script th:src="@{/assets/js/core/jquery.min.js}"></script>
  <script th:src="@{/assets/js/core/popper.min.js}"></script>
  <script th:src="@{/assets/js/core/bootstrap.min.js}"></script>
  <script th:src="@{/assets/js/plugins/perfect-scrollbar.jquery.min.js}"></script>
  <!-- Chart JS -->
  <script th:src="@{/assets/js/plugins/chartjs.min.js}"></script>
  <!-- Notifications Plugin -->
  <script th:src="@{/assets/js/plugins/bootstrap-notify.js}"></script>
  <!-- Control Center for Black Dashboard -->
  <script th:src="@{/assets/js/black-dashboard.min.js}"></script>
  <!-- Black Dashboard DEMO methods, don't include it in your project! -->
  <script th:src="@{/assets/demo/demo.js}"></script>
  <script th:src="@{/assets/echarts.js}"></script>
  <!-- ECharts WordCloud Extension -->
  <script th:src="@{/assets/echarts-wordcloud.min.js}"></script>

  <!-- 内联JavaScript，使用Thymeleaf变量 -->
  <script th:inline="javascript">
    /*<![CDATA[*/
    $(document).ready(function() {
      $().ready(function() {
        $sidebar = $('.sidebar');
        $navbar = $('.navbar');
        $main_panel = $('.main-panel');
        $full_page = $('.full-page');
        $sidebar_responsive = $('body > .navbar-collapse');
        sidebar_mini_active = true;
        white_color = false;
        window_width = $(window).width();
        fixed_plugin_open = $('.sidebar .sidebar-wrapper .nav li.active a p').html();

        $('.fixed-plugin a').click(function(event) {
          if ($(this).hasClass('switch-trigger')) {
            if (event.stopPropagation) {
              event.stopPropagation();
            } else if (window.event) {
              window.event.cancelBubble = true;
            }
          }
        });

        $('.fixed-plugin .background-color span').click(function() {
          $(this).siblings().removeClass('active');
          $(this).addClass('active');
          var new_color = $(this).data('color');
          if ($sidebar.length != 0) {
            $sidebar.attr('data', new_color);
          }
          if ($main_panel.length != 0) {
            $main_panel.attr('data', new_color);
          }
          if ($full_page.length != 0) {
            $full_page.attr('filter-color', new_color);
          }
          if ($sidebar_responsive.length != 0) {
            $sidebar_responsive.attr('data', new_color);
          }
        });

        $('.switch-sidebar-mini input').on("switchChange.bootstrapSwitch", function() {
          var $btn = $(this);
          if (sidebar_mini_active == true) {
            $('body').removeClass('sidebar-mini');
            sidebar_mini_active = false;
            blackDashboard.showSidebarMessage('Sidebar mini deactivated...');
          } else {
            $('body').addClass('sidebar-mini');
            sidebar_mini_active = true;
            blackDashboard.showSidebarMessage('Sidebar mini activated...');
          }
          var simulateWindowResize = setInterval(function() {
            window.dispatchEvent(new Event('resize'));
          }, 180);
          setTimeout(function() {
            clearInterval(simulateWindowResize);
          }, 1000);
        });

        $('.switch-change-color input').on("switchChange.bootstrapSwitch", function() {
          var $btn = $(this);
          if (white_color == true) {
            $('body').addClass('change-background');
            setTimeout(function() {
              $('body').removeClass('change-background');
              $('body').removeClass('white-content');
            }, 900);
            white_color = false;
          } else {
            $('body').addClass('change-background');
            setTimeout(function() {
              $('body').removeClass('change-background');
              $('body').addClass('white-content');
            }, 900);
            white_color = true;
          }
        });

        $('.light-badge').click(function() {
          $('body').addClass('white-content');
        });
        $('.dark-badge').click(function() {
          $('body').removeClass('white-content');
        });
      });
    });
    /*]]>*/
  </script>

  <script th:inline="javascript">
    /*<![CDATA[*/
    $(document).ready(function() {
      demo.initDashboardPageCharts();
    });
    /*]]>*/
  </script>

  <!-- 词云图脚本 -->
  <script th:inline="javascript">
    /*<![CDATA[*/
    // 词云图
    var chartDom = document.getElementById('wordcloud');
    var myChart = echarts.init(chartDom);
    var option;

    // 从控制器传递的词云数据，格式如：[{name: '关键词', value: 100}, ...]
    var wordCloudData = /*[[${wordCloudData}]]*/ [];

    // 如果数据为空，使用示例数据并显示提示
    if (!wordCloudData || wordCloudData.length === 0) {
      console.warn('词云数据为空，使用示例数据');
      wordCloudData = [
        {name: '玄幻', value: 100},
        {name: '修真', value: 90},
        {name: '都市', value: 80},
        {name: '言情', value: 70},
        {name: '历史', value: 60},
        {name: '科幻', value: 50},
        {name: '奇幻', value: 40},
        {name: '武侠', value: 30},
        {name: '军事', value: 20},
        {name: '游戏', value: 10}
      ];

      // 显示警告消息
      var alertDiv = document.createElement('div');
      alertDiv.className = 'alert alert-warning alert-dismissible fade show';
      alertDiv.innerHTML = '<strong>注意：</strong>当前没有足够的词云数据，显示的是示例数据。';
      document.querySelector('.card-body').insertBefore(alertDiv, document.getElementById('wordcloud'));
    }

    option = {
      title: {
        textStyle: {
          fontSize: 24,
          color: '#fff'
        },
        left: 'center',
        top: '5%'
      },
      tooltip: {
        show: true
      },
      series: [{
        type: 'wordCloud',
        shape: 'circle',
        left: 'center',
        top: 'center',
        width: '90%',
        height: '90%',
        right: null,
        bottom: null,
        sizeRange: [12, 60],
        rotationRange: [-90, 90],
        rotationStep: 45,
        gridSize: 8,
        drawOutOfBound: false,
        layoutAnimation: true,
        textStyle: {
          fontFamily: 'sans-serif',
          fontWeight: 'bold',
          color: function () {
            return 'rgb(' + [
              Math.round(Math.random() * 160 + 95),
              Math.round(Math.random() * 160 + 95),
              Math.round(Math.random() * 160 + 95)
            ].join(',') + ')';
          }
        },
        emphasis: {
          focus: 'self',
          textStyle: {
            shadowBlur: 10,
            shadowColor: '#333'
          }
        },
        data: wordCloudData
      }]
    };

    option && myChart.setOption(option);

    // 窗口大小调整时重绘图表
    window.addEventListener('resize', function() {
      myChart.resize();
    });
    /*]]>*/
  </script>

</body>
</html>
