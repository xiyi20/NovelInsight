spring:
  application:
    name: novel-insight-spring

  # 本地MySQL数据源 (novelData数据库)
  datasource:
    novel:
      url: jdbc:mysql://127.0.0.1:3306/novelData
      username: root
      password: 324254
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        connection-timeout: 30000
        maximum-pool-size: 10
        minimum-idle: 5

    # 集群MySQL数据源 (bigdata数据库)
    bigdata:
      url: jdbc:mysql://node1:3306/bigdata
      username: root
      password: 123456
      driver-class-name: com.mysql.cj.jdbc.Driver
      hikari:
        connection-timeout: 30000
        maximum-pool-size: 10
        minimum-idle: 5

    # Hive数据源
    hive:
      url: jdbc:hive2://node1:10000/default;socketTimeout=120000
      username: hadoop
      driver-class-name: org.apache.hive.jdbc.HiveDriver
      hikari:
        connection-timeout: 60000
        maximum-pool-size: 5
        minimum-idle: 2

  # JPA配置 (主数据源使用novel)
  jpa:
    open-in-view: false
    show-sql: true

  # Thymeleaf配置
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

  # 静态资源映射
  web:
    resources:
      static-locations: classpath:/static/

  # 会话管理
  session:
    timeout: 1800  # 30分钟

# 日志配置
logging:
  level:
    com.novelinsight: DEBUG
    org.springframework.security: INFO